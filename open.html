<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dearly — open your card</title>
<meta name="description" content="Enter your code to open a card someone made for you.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%92%8C%3C/text%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Parisienne&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/styles.css">
<style>
  /* ---- receiver-only extras ---- */
  .receiver-landing {
    text-align: center;
  }
  .receiver-landing .gift {
    font-size: 4rem;
    display: block;
    margin: 0 auto 18px;
    animation: floatY 3.5s ease-in-out infinite;
  }
  .error-msg {
    color: #E7C9CE;
    font-size: .82rem;
    margin-top: 10px;
    text-align: center;
  }
  .spinner {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2px solid rgba(232,193,107,.3);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="starsSmall" class="stars"></div>
<div id="starsBig"   class="stars"></div>

<div id="app">
  <div class="stage" id="stage"></div>
</div>

<script type="module">
import { firebaseConfig } from './js/firebase-config.js';
import { loadCard }       from './js/storage.js';
import { VIBES, RELATIONSHIPS } from './js/data.js';
import { escapeHtml, formatTime, debounce } from './js/utils.js';
import { buildStars, tapOrb as orbTap } from './js/view.js';

/* ─── state ─── */
const s = {
  step: 'entry',   // entry | envelope | orbs | photos | final
  card: null,
  orb: { tapped: [false,false,false,false], count: 0, timer: null },
  audioPlayer: null
};

/* ─── starfield ─── */
buildStars();
window.addEventListener('resize', debounce(buildStars, 400));

/* ─── render ─── */
function render() {
  const stage = document.getElementById('stage');
  stage.innerHTML = html();
  stage.classList.remove('enter');
  void stage.offsetWidth;
  stage.classList.add('enter');
  afterRender();
}

function html() {
  switch (s.step) {
    case 'entry':    return screenEntry();
    case 'loading':  return screenLoading();
    case 'envelope': return screenEnvelope();
    case 'orbs':     return screenOrbs();
    case 'photos':   return screenPhotos();
    case 'final':    return screenFinal();
    default:         return screenEntry();
  }
}

function afterRender() {
  if (s.step === 'envelope') wireSlide();
}

/* ─── screens ─── */
function screenEntry(errorMsg) {
  return `
    <div class="receiver-landing">
      <span class="gift">🎁</span>
      <div class="eyebrow">✦ Dearly</div>
      <h1 class="title">Someone made you something.</h1>
      <p class="subtitle">Enter the 6-character code they sent you.</p>
    </div>
    <input type="text" id="codeInput" placeholder="ABC123"
      maxlength="8" autocomplete="off" autocapitalize="characters"
      style="text-align:center; letter-spacing:.16em; font-size:1.3rem; padding:18px;">
    <div style="height:14px"></div>
    <button class="btn btn-primary" id="openBtn">Open my card →</button>
    ${errorMsg ? `<p class="error-msg">${escapeHtml(errorMsg)}</p>` : ''}
  `;
}

function screenLoading() {
  return `
    <div style="text-align:center; padding:60px 0;">
      <span class="spinner"></span>
      <span style="color:var(--muted); font-size:.95rem;">Opening your card…</span>
    </div>
  `;
}

function screenEnvelope() {
  const vibe = VIBES[s.card.vibe];
  const rel  = RELATIONSHIPS[s.card.relationship] || { eyebrowSmall: 'A card for you' };
  return `
    <div class="envelope-wrap">
      <div class="eyebrow">✦ ${rel.eyebrowSmall}</div>
      <div class="script-line">${escapeHtml(vibe.envelopeTitle)}</div>
      <div class="envelope-stage" id="envelopeStage">
        <div class="envelope-flower">${vibe.motif}</div>
        <div class="envelope-body"><div class="envelope-to">To ${escapeHtml(s.card.name)}</div></div>
        <div class="envelope-flap"></div>
        <div class="envelope-seal">${vibe.emoji}</div>
      </div>
      <div class="slide-track" id="slideTrack">
        <div class="slide-fill"  id="slideFill"></div>
        <div class="slide-label">Slide to open <span>→</span></div>
        <div class="slide-knob"  id="slideKnob">${vibe.motif}</div>
      </div>
    </div>
  `;
}

function screenOrbs() {
  const vibe   = VIBES[s.card.vibe];
  const blurs  = [18, 13, 8, 3, 0];
  const blur   = blurs[s.orb.count];
  const quote  = vibe.orbLines[Math.max(0, Math.min(s.orb.count - 1, 3))] || vibe.orbLines[0];
  const photo  = s.card.photos[0] || null;
  const icons  = ['💛','✨','🌸','🕊️'];
  const pos    = ['p1','p2','p3','p4'];

  const orbsHtml = [0,1,2,3].map(i => {
    if (s.orb.tapped[i])
      return `<button class="orb tapped ${pos[i]}" data-idx="${i}">${icons[i]}</button>`;
    return `<button class="orb ${pos[i]}" data-orbaction="tap" data-idx="${i}">${icons[i]}</button>`;
  }).join('');

  return `
    <div class="quote-box surface">
      <span class="quote-emoji">${vibe.emoji}</span>
      <span id="quoteText">"${escapeHtml(quote)}"</span>
    </div>
    <div class="porthole-wrap">
      <div class="porthole">
        ${photo
          ? `<img src="${photo}" id="portholeImg" style="filter:blur(${blur}px) brightness(.85);">`
          : `<div class="placeholder" id="portholeImg" style="filter:blur(${blur}px);">${vibe.motif}</div>`}
      </div>
      <div class="orbit-layer">${orbsHtml}</div>
    </div>
    <div class="orb-progress">Tap the orbs! (${s.orb.count} / 4)</div>
    <button class="btn btn-primary" id="orbContinueBtn" data-nextaction="toPhotos"
      style="opacity:${s.orb.count >= 4 ? 1 : 0};
             pointer-events:${s.orb.count >= 4 ? 'auto' : 'none'};
             transition:opacity .3s;">
      Continue →
    </button>
  `;
}

function screenPhotos() {
  const vibe = VIBES[s.card.vibe];
  const remaining = s.card.photos.slice(1, 3);

  const photosHtml = remaining.length
    ? `<div class="polaroid-row">${remaining.map(p =>
        `<div class="polaroid"><img src="${p}"></div>`).join('')}</div>`
    : '';

  const voiceHtml = s.card.voice ? `
    <div class="player-box surface">
      <button class="player-btn" id="playBtn">▶</button>
      <div class="voice-meta">
        <strong>Voice note</strong>
        <span>${formatTime(s.card.voiceDuration)}</span>
      </div>
      <div class="bars" id="voiceBars">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>` : '';

  const empty = (!remaining.length && !s.card.voice)
    ? `<div class="empty-soft">✦ ✦ ✦</div>` : '';

  return `
    <div class="eyebrow">${vibe.emoji} A little more</div>
    <h1 class="title">${escapeHtml(vibe.photoHeadline)}</h1>
    ${photosHtml}
    ${voiceHtml}
    ${empty}
    <div style="height:18px"></div>
    <button class="btn btn-primary" data-nextaction="toFinal">Next →</button>
  `;
}

function screenFinal() {
  const rel = RELATIONSHIPS[s.card.relationship] || { eyebrow: 'TO YOU' };
  const sig = s.card.senderName
    ? `with love, ${escapeHtml(s.card.senderName)}`
    : 'made with love · Dearly';
  return `
    <div class="final-card">
      <span class="corner tl">✦</span><span class="corner tr">🤍</span>
      <div class="eyebrow">${rel.eyebrow}</div>
      <div class="final-name">${escapeHtml(s.card.name)} ❤️</div>
      <p class="final-message">"${escapeHtml(s.card.message)}"</p>
      <div class="final-footer">~ ✦ ~<br>${sig}</div>
      <span class="corner bl">🤍</span><span class="corner br">🌙</span>
    </div>
    <button class="btn btn-ghost home-btn" id="homeBtn">🏠 Home</button>
  `;
}

/* ─── open card by code ─── */
async function openCard(code) {
  s.step = 'loading';
  render();
  try {
    const data = await loadCard(code.trim().toUpperCase());
    s.card = {
      senderName:   data.senderName   || '',
      name:         data.name         || '',
      vibe:         data.vibe,
      relationship: data.relationship,
      message:      data.message      || '',
      photos:       data.photos       || [],
      voice:        data.voice        || null,
      voiceDuration:data.voiceDuration|| 0
    };
    s.orb = { tapped:[false,false,false,false], count:0, timer:null };
    s.step = 'envelope';
    render();
  } catch (err) {
    s.step = 'entry';
    render();
    // re-inject error beneath the button
    const errArea = document.querySelector('.error-msg') || (() => {
      const p = document.createElement('p');
      p.className = 'error-msg';
      document.getElementById('stage').appendChild(p);
      return p;
    })();
    errArea.textContent =
      "We couldn't find a card with that code. Double-check it and try again.";
  }
}

/* ─── orb burst ─── */
function spawnBurst(orbEl) {
  const wrap = document.querySelector('.porthole-wrap');
  if (!wrap || !orbEl) return;
  const wr = wrap.getBoundingClientRect();
  const or = orbEl.getBoundingClientRect();
  const ox = or.left + or.width / 2 - wr.left;
  const oy = or.top  + or.height / 2 - wr.top;
  const icon = orbEl.textContent || '✨';
  for (let i = 0; i < 10; i++) {
    const p = document.createElement('span');
    p.className = 'orb-burst';
    p.textContent = icon;
    const angle = (Math.PI * 2 * i / 10) + (Math.random() * 0.6 - 0.3);
    const dist  = 36 + Math.random() * 54;
    p.style.left = `${ox}px`;
    p.style.top  = `${oy}px`;
    p.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
    p.style.setProperty('--dy', `${Math.sin(angle) * dist - 14}px`);
    p.style.animationDelay = `${Math.random() * 0.12}s`;
    wrap.appendChild(p);
    setTimeout(() => p.parentNode && p.parentNode.removeChild(p), 1100);
  }
}

function handleOrbTap(idx) {
  if (s.orb.tapped[idx]) return;
  s.orb.tapped[idx] = true;
  s.orb.count++;

  const orbEl = document.querySelector(`.orb[data-idx="${idx}"]`);
  spawnBurst(orbEl);
  if (orbEl) { orbEl.classList.add('tapped'); orbEl.removeAttribute('data-orbaction'); }

  const vibe = VIBES[s.card.vibe];
  const qt = document.getElementById('quoteText');
  if (qt) qt.textContent = `"${vibe.orbLines[Math.min(s.orb.count - 1, 3)]}"`;

  const img = document.getElementById('portholeImg');
  if (img) img.style.filter = `blur(${[18,13,8,3,0][s.orb.count]}px) brightness(.85)`;

  const prog = document.querySelector('.orb-progress');
  if (prog) prog.textContent = `Tap the orbs! (${s.orb.count} / 4)`;

  if (s.orb.count >= 4) {
    const btn = document.getElementById('orbContinueBtn');
    if (btn) { btn.style.opacity = '1'; btn.style.pointerEvents = 'auto'; }
    s.orb.timer = setTimeout(() => {
      if (s.step === 'orbs') { s.step = 'photos'; render(); }
    }, 1700);
  }
}

/* ─── audio ─── */
function togglePlay() {
  if (!s.card.voice) return;
  if (!s.audioPlayer) {
    s.audioPlayer = new Audio();
    s.audioPlayer.addEventListener('ended', () => setPlayState(false));
  }
  if (s.audioPlayer.src !== s.card.voice) s.audioPlayer.src = s.card.voice;
  if (s.audioPlayer.paused) { s.audioPlayer.play().catch(() => {}); setPlayState(true); }
  else { s.audioPlayer.pause(); setPlayState(false); }
}

function setPlayState(playing) {
  const btn  = document.getElementById('playBtn');
  const bars = document.getElementById('voiceBars');
  if (btn)  btn.textContent = playing ? '⏸' : '▶';
  if (bars) bars.classList.toggle('playing', playing);
}

/* ─── slide to open ─── */
function wireSlide() {
  const track = document.getElementById('slideTrack');
  if (!track) return;
  const knob = document.getElementById('slideKnob');
  const fill = document.getElementById('slideFill');
  let dragging = false, startX = 0, kStart = 4;
  const maxL = () => Math.max(track.clientWidth - knob.offsetWidth - 8, 10);

  function down(e) {
    dragging = true; knob.classList.add('dragging');
    startX = e.touches ? e.touches[0].clientX : e.clientX;
    kStart = parseFloat(knob.style.left || '4');
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
    document.addEventListener('touchmove', move, { passive: false });
    document.addEventListener('touchend', up);
  }
  function move(e) {
    if (!dragging) return;
    if (e.cancelable) e.preventDefault();
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const left = Math.min(Math.max(kStart + (x - startX), 4), maxL());
    knob.style.left = `${left}px`;
    fill.style.width = `${(left / maxL()) * 100}%`;
  }
  function up() {
    if (!dragging) return;
    dragging = false; knob.classList.remove('dragging');
    document.removeEventListener('mousemove', move);
    document.removeEventListener('mouseup', up);
    document.removeEventListener('touchmove', move);
    document.removeEventListener('touchend', up);
    const pct = parseFloat(knob.style.left || '4') / maxL();
    if (pct > 0.78) {
      knob.style.left = `${maxL()}px`; fill.style.width = '100%';
      openEnvelope();
    } else {
      knob.style.left = '4px'; fill.style.width = '0%';
    }
  }
  knob.addEventListener('mousedown', down);
  knob.addEventListener('touchstart', down, { passive: true });
}

function openEnvelope() {
  const el = document.getElementById('envelopeStage');
  if (el) el.classList.add('open');
  s.orb = { tapped:[false,false,false,false], count:0, timer:null };
  setTimeout(() => { s.step = 'orbs'; render(); }, 650);
}

/* ─── event delegation ─── */
document.getElementById('app').addEventListener('click', e => {
  const t = e.target;

  /* open button */
  if (t.id === 'openBtn' || t.closest('#openBtn')) {
    const inp = document.getElementById('codeInput');
    const code = (inp && inp.value || '').trim();
    if (!code) { inp && inp.focus(); return; }
    openCard(code);
    return;
  }

  /* allow pressing Enter in the code input */
  if (t.id === 'codeInput') return; // handled by keydown

  /* orb tap */
  const orbBtn = t.closest('[data-orbaction="tap"]');
  if (orbBtn) { handleOrbTap(parseInt(orbBtn.dataset.idx, 10)); return; }

  /* generic next actions */
  const next = t.closest('[data-nextaction]');
  if (next) {
    const action = next.dataset.nextaction;
    if (action === 'toPhotos') {
      clearTimeout(s.orb.timer);
      s.step = 'photos'; render();
    }
    if (action === 'toFinal') { s.step = 'final'; render(); }
    return;
  }

  /* play button */
  if (t.id === 'playBtn' || t.closest('#playBtn')) { togglePlay(); return; }

  /* home */
  if (t.id === 'homeBtn' || t.closest('#homeBtn')) {
    s.step = 'entry'; s.card = null;
    if (s.audioPlayer) { s.audioPlayer.pause(); s.audioPlayer = null; }
    render();
  }
});

/* Enter key in code input */
document.getElementById('app').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const inp = document.getElementById('codeInput');
    if (inp && document.activeElement === inp) {
      const code = inp.value.trim();
      if (code) openCard(code);
    }
  }
});

/* ─── boot ─── */
render();
</script>
</body>
</html>
